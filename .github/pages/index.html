<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Evolution Journal</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      max-width: 48rem;
      margin: 2rem auto;
      padding: 0 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1f2328;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e6edf3; }
    }
    h1 { text-align: center; }
    .cycle { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #d0d7de; }
    @media (prefers-color-scheme: dark) {
      .cycle { border-bottom-color: #3d444d; }
    }
    .cycle-header { color: #0969da; margin-bottom: 0.5rem; }
    @media (prefers-color-scheme: dark) {
      .cycle-header { color: #58a6ff; }
    }
    .cycle-date { color: #656d76; font-size: 0.9rem; margin-bottom: 1rem; }
    details { margin-bottom: 0.5rem; }
    summary { cursor: pointer; font-weight: 600; padding: 0.25rem 0; }
    .section-content { padding: 0.5rem 1rem; white-space: pre-wrap; }
    .empty { color: #656d76; text-align: center; padding: 4rem 0; }
  </style>
</head>
<body>
  <h1>Bloom Evolution Journal</h1>
  <div id="content"><p class="empty">Loading...</p></div>
  <script>
    fetch('journal.json')
      .then(r => r.json())
      .then(entries => {
        const el = document.getElementById('content');
        if (!entries.length) {
          el.innerHTML = '<p class="empty">No journal entries yet.</p>';
          return;
        }
        el.innerHTML = entries.map(e => `
          <div class="cycle">
            <h2 class="cycle-header">Cycle ${e.cycleNumber}</h2>
            <div class="cycle-date">${e.date}</div>
            <details open>
              <summary>What was attempted</summary>
              <div class="section-content">${esc(e.attempted)}</div>
            </details>
            <details>
              <summary>What succeeded</summary>
              <div class="section-content">${esc(e.succeeded)}</div>
            </details>
            <details>
              <summary>What failed</summary>
              <div class="section-content">${esc(e.failed)}</div>
            </details>
            <details>
              <summary>Learnings</summary>
              <div class="section-content">${esc(e.learnings)}</div>
            </details>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p class="empty">Failed to load journal.</p>';
      });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '(none)';
      return d.innerHTML;
    }
  </script>
</body>
</html>
